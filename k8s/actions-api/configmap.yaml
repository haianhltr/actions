apiVersion: v1
kind: ConfigMap
metadata:
  name: actions-config
  namespace: actions
  labels:
    app: actions-api
    team: team6
data:
  rbac.yaml: |
    roles:
      platform-admin:
        can_act_on: all
        description: "Can act on any entity in any namespace"
      team-member:
        can_act_on: owned_entities
        description: "Can act on entities owned by their team"
    team_mappings:
      app-team:
        members:
          - "engineer@team.com"
        owns:
          - "k8s:lab:calculator:*"
      platform-team:
        members:
          - "sre@team.com"
        role: platform-admin
    tier_restrictions:
      tier-1:
        requires_approval: true
      tier-2:
        requires_approval: false
      tier-3:
        requires_approval: false
  auto-remediation.yaml: |
    auto_actions:
      - name: restart_on_crashloop
        trigger:
          new_state: UNHEALTHY
          reason_contains: "CrashLoopBackOff"
          entity_type: Deployment
        action:
          type: restart_deployment
          max_per_hour: 2
          cooldown_minutes: 30
        enabled: true
      - name: scale_on_lag
        trigger:
          new_state: DEGRADED
          reason_contains: "Consumer lag"
          entity_type: Deployment
        action:
          type: scale_deployment
          parameters:
            replicas_add: 1
            max_replicas: 5
          max_per_hour: 3
          cooldown_minutes: 15
        enabled: false
